<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Desktop Layout Overlap Smoke</title>
<style>
  body {
    margin: 0;
    padding: 16px;
    font: 14px/1.5 sans-serif;
    background: #f6f6f6;
    color: #111;
  }

  #result {
    white-space: pre-wrap;
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 12px;
    padding: 16px;
  }

  iframe {
    border: 0;
    position: absolute;
    left: -9999px;
    top: -9999px;
    opacity: 0;
    pointer-events: none;
  }
</style>
</head>
<body>
<div id="result">Running desktop overlap smoke test...</div>
<iframe id="app-frame" src="about:blank"></iframe>
<script>
  const DESKTOP_LAYOUT_KEY = 'mini.desktop.layout.v5';
  const LEGACY_LAYOUT_KEYS = ['mini.desktop.icon.layout.v2', 'mini.desktop.icon.layout.v1'];

  function sleep(ms) {
    return new Promise((resolve) => setTimeout(resolve, ms));
  }

  async function waitFor(predicate, timeout = 20000) {
    const start = Date.now();
    while (Date.now() - start < timeout) {
      const value = predicate();
      if (value) return value;
      await sleep(50);
    }
    throw new Error('Timed out waiting for page state');
  }

  function setResult(ok, payload) {
    const result = document.getElementById('result');
    result.textContent = (ok ? 'PASS\n' : 'FAIL\n') + (
      typeof payload === 'string' ? payload : JSON.stringify(payload, null, 2)
    );
    result.dataset.status = ok ? 'pass' : 'fail';
  }

  function openThemeDb() {
    return new Promise((resolve, reject) => {
      const request = indexedDB.open('UIDesignDB', 3);
      request.onupgradeneeded = () => {
        const db = request.result;
        if (!db.objectStoreNames.contains('settings')) {
          db.createObjectStore('settings', { keyPath: 'id' });
        }
      };
      request.onerror = () => reject(request.error || new Error('Failed to open theme DB'));
      request.onsuccess = () => resolve(request.result);
    });
  }

  async function clearDesktopLayoutPersistence() {
    [DESKTOP_LAYOUT_KEY].concat(LEGACY_LAYOUT_KEYS).forEach((key) => {
      try {
        localStorage.removeItem(key);
      } catch (error) {}
    });

    const db = await openThemeDb();
    await new Promise((resolve, reject) => {
      const tx = db.transaction('settings', 'readwrite');
      tx.objectStore('settings').delete(DESKTOP_LAYOUT_KEY);
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error || new Error('Failed to clear desktop layout'));
    });
    db.close();
  }

  function rect(el) {
    if (!el) return null;
    const r = el.getBoundingClientRect();
    return {
      top: Number(r.top.toFixed(2)),
      bottom: Number(r.bottom.toFixed(2)),
      left: Number(r.left.toFixed(2)),
      right: Number(r.right.toFixed(2)),
      width: Number(r.width.toFixed(2)),
      height: Number(r.height.toFixed(2))
    };
  }

  function intersectsRect(a, b, epsilon = 1) {
    if (!a || !b) return false;
    return !(
      a.right <= b.left + epsilon
      || a.left >= b.right - epsilon
      || a.bottom <= b.top + epsilon
      || a.top >= b.bottom - epsilon
    );
  }

  function collectPageState(page, pageIndex) {
    const widgetRects = Array.from(page.querySelectorAll('[data-mini-desktop-widget="1"]'))
      .filter((item) => {
        const style = page.ownerDocument.defaultView.getComputedStyle(item);
        return style.display !== 'none' && style.visibility !== 'hidden';
      })
      .map((item) => ({
        id: item.dataset.miniDesktopWidgetId || item.className,
        rect: rect(item)
      }))
      .filter((item) => item.rect && item.rect.height > 0);

    const iconRects = Array.from(page.querySelectorAll('.mini-desktop-icon-layer > .app-item[data-mini-desktop-icon="1"]'))
      .filter((item) => {
        const style = page.ownerDocument.defaultView.getComputedStyle(item);
        return style.display !== 'none' && style.visibility !== 'hidden';
      })
      .map((item) => ({
        id: item.dataset.miniDesktopIconId || item.className,
        slot: item.dataset.miniDesktopSlot || '',
        rect: rect(item)
      }))
      .filter((item) => item.rect && item.rect.height > 0)
      .sort((left, right) => {
        if (Math.abs(left.rect.top - right.rect.top) > 1) return left.rect.top - right.rect.top;
        return left.rect.left - right.rect.left;
      });

    const intersections = [];
    widgetRects.forEach((widget) => {
      iconRects.forEach((icon) => {
        if (!intersectsRect(widget.rect, icon.rect)) return;
        intersections.push({
          widgetId: widget.id,
          iconId: icon.id,
          widgetRect: widget.rect,
          iconRect: icon.rect
        });
      });
    });

    return {
      pageIndex,
      pageRect: rect(page),
      overlapped: intersections.length > 0,
      intersections,
      widgetRects,
      iconRects: iconRects.slice(0, 4)
    };
  }

  window.addEventListener('load', async () => {
    try {
      await clearDesktopLayoutPersistence();

      const frame = document.getElementById('app-frame');
      frame.style.width = '430px';
      frame.style.height = '932px';
      frame.src = '/APP/desktop/desktop.html?smoke=desktop-overlap';

      await waitFor(() => {
        const doc = frame.contentDocument;
        return doc
          && doc.body
          && doc.querySelector('.mini-desktop-icon-layer .app-item[data-mini-desktop-icon="1"]')
          && doc.querySelector('[data-mini-desktop-widget="1"]');
      });

      await sleep(1200);

      const doc = frame.contentDocument;
      const pages = Array.from(doc.querySelectorAll('.screen-container .page'));
      const pageStates = pages.map((page, index) => collectPageState(page, index));
      const overlappedPages = pageStates.filter((page) => page.overlapped);

      const payload = {
        viewport: {
          width: frame.clientWidth,
          height: frame.clientHeight
        },
        bodyClasses: doc.body.className,
        pageStates
      };

      if (overlappedPages.length) {
        throw new Error(JSON.stringify(payload, null, 2));
      }

      setResult(true, payload);
    } catch (error) {
      setResult(false, error && error.message ? error.message : String(error));
    }
  });
</script>
</body>
</html>
